global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "tf-serving-monitor"

scrape_configs:
  - job_name: "tf-serving"
    scrape_interval: 5s
    metrics_path: /monitoring/prometheus/metrics
    static_configs:
      - targets: ["chicago-taxi-mlops-production.up.railway.app:443"]
        labels:
          application: "taxi-tip-prediction"
    scheme: https

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
